<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Language Translator | CodeAlpha</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <!-- AI Animated Background -->
    <div class="ai-background" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="particle-layer particle-layer-1"></div>
        <div class="particle-layer particle-layer-2"></div>
        <div class="particle-layer particle-layer-3"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <header>
            <h1><i class="fa-solid fa-earth-americas"></i> AI Translator</h1>
            <p>Translate text between multiple languages instantly using Google AI.</p>
        </header>

        <!-- Main Card -->
        <main class="translator-card glassmorphism">
            <div class="controls-row">
                <!-- Source Language -->
                <div class="select-container">
                    <select id="sourceLang">
                        <option value="auto">🤖 Auto Detect</option>
                        {% for name, code in languages.items() %}
                        <option value="{{ code }}">{{ name | capitalize }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Swap Button -->
                <button id="swapBtn" class="icon-btn" title="Swap Languages">
                    <i class="fa-solid fa-right-left"></i>
                </button>

                <!-- Target Language -->
                <div class="select-container">
                    <select id="targetLang">
                        {% for name, code in languages.items() %}
                        <option value="{{ code }}" {% if code=='es' %}selected{% endif %}>{{ name | capitalize }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Text Areas -->
            <div class="textareas-row">
                <!-- Source Text Area -->
                <div class="textarea-container">
                    <textarea id="sourceText" placeholder="Type or paste your text here..."
                        spellcheck="false"></textarea>
                    <div class="textarea-footer">
                        <span id="charCount">0 characters</span>
                        <div class="actions">
                            <button id="voiceBtn" class="icon-btn" title="Voice Input"><i
                                    class="fa-solid fa-microphone"></i></button>
                            <button id="clearBtn" class="icon-btn" title="Clear Text"><i
                                    class="fa-solid fa-xmark"></i></button>
                        </div>
                    </div>
                </div>

                <!-- Target Text Area -->
                <div class="textarea-container target">
                    <div id="loadingOverlay" class="loading-overlay hidden">
                        <div class="spinner"></div>
                        <p>Translating...</p>
                    </div>
                    <textarea id="targetText" placeholder="Translation will appear here..." readonly></textarea>
                    <div class="textarea-footer">
                        <span></span>
                        <div class="actions">
                            <button id="copyBtn" class="icon-btn" title="Copy to Clipboard"><i
                                    class="fa-regular fa-copy"></i></button>
                            <button id="ttsBtn" class="icon-btn" title="Listen"><i
                                    class="fa-solid fa-volume-high"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Button -->
            <div class="translate-btn-container">
                <button id="translateBtn" class="primary-btn">
                    <i class="fa-solid fa-language"></i> Translate
                </button>
            </div>

            <!-- Error Message Box -->
            <div id="errorBox" class="error-box hidden"></div>
        </main>

        <!-- Translation History -->
        <section class="history-section glassmorphism">
            <div class="history-header">
                <h3><i class="fa-solid fa-clock-rotate-left"></i> Recent Translations</h3>
                <button id="clearHistoryBtn" class="text-btn">Clear All</button>
            </div>
            <ul id="historyList" class="history-list">
                <!-- History items will be injected here via JS -->
            </ul>
        </section>

        <!-- Footer -->
        <footer>
            <p>Developed by <strong>UDAY KUMAR</strong> | Artificial Intelligence.</p>
        </footer>
    </div>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
